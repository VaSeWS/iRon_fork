name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild iron.sln /p:Configuration=Release /p:Platform=x64 /m /verbosity:minimal

      - name: Package
        shell: pwsh
        run: |
          $zipName = "iron-${{ github.ref_name }}-x64.zip"
          Compress-Archive -Path x64/Release/iron.exe -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true
          draft: false
          prerelease: false
