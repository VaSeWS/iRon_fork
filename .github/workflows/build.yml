name: build

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
    steps:
      - uses: actions/checkout@v4

      - uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild iron.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=x64 /m /verbosity:minimal

      - uses: actions/upload-artifact@v4
        with:
          name: iron-${{ matrix.configuration }}-x64-${{ github.sha }}
          path: x64/${{ matrix.configuration }}/iron.exe
          retention-days: 14
          if-no-files-found: error
